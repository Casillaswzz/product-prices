<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品价格查询</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 24px;
    padding: 24px;
  }
  h1 { color: white; font-size: 1.6rem; text-align: center; }
  .cards {
    display: flex; gap: 24px; flex-wrap: wrap; justify-content: center;
  }
  .card {
    background: white; border-radius: 16px; padding: 32px 28px;
    text-align: center; width: 280px; cursor: pointer;
    transition: all 0.25s; text-decoration: none; color: inherit;
    box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .card:hover { transform: translateY(-4px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
  .card .icon { font-size: 3rem; }
  .card h2 { font-size: 1.2rem; color: #1e293b; }
  .card p { font-size: 0.85rem; color: #64748b; }
  .card.wholesale { border-top: 4px solid #0ea5e9; }
  .card.retail { border-top: 4px solid #2563eb; }
  .hint { color: rgba(255,255,255,0.55); font-size: 0.78rem; margin-top: 8px; text-align: center; max-width: 400px; line-height: 1.6; }
</style>
</head>
<body>
<h1>🤿 产品价格查询系统</h1>
<div class="cards">
  <a href="wholesale.html" class="card wholesale">
    <span class="icon">📦</span>
    <h2>产品出库价格</h2>
    <p>9 个分类 · 55 款产品</p>
  </a>
  <a href="retail.html" class="card retail">
    <span class="icon">🏷️</span>
    <h2>产品零售价格</h2>
    <p>10 个分类 · 80 款产品</p>
  </a>
</div>
<p class="hint">💡 通过 GitHub Pages 部署后，手机电脑皆可访问<br>编辑保存到浏览器本地，支持 CSV 导出备份</p>
</body>
</html>
