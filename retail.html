<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>产品零售价格表</title>
<style>
  :root {
    --bg: #f5f8fb;
    --card-bg: #ffffff;
    --text: #1a2a3c;
    --text-secondary: #54708a;
    --border: #dce6f0;
    --accent: #2563eb;
    --accent-light: #e8f0fe;
    --danger: #dc3545;
    --danger-light: #fef2f2;
    --success: #059669;
    --price-color: #1d4ed8;
    --note-color: #1e40af;
    --cb-color: #7c3aed;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px rgba(0,0,0,0.05), 0 2px 4px rgba(0,0,0,0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-padding-top: 200px; scroll-behavior: smooth; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }

  .header {
    background: linear-gradient(135deg, #1e3a5f 0%, #1d4ed8 50%, #2563eb 100%);
    color: white;
    padding: 24px 24px 20px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(0,0,0,0.2);
  }
  .header h1 { font-size: 1.75rem; font-weight: 700; letter-spacing: 0.02em; margin-bottom: 2px; }
  .header .subtitle { font-size: 0.85rem; opacity: 0.75; font-weight: 400; }
  .header .update-time { font-size: 0.75rem; opacity: 0.55; margin-top: 2px; display: flex; align-items: center; justify-content: center; gap: 6px; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; background: #94a3b8; transition: background 0.3s; }
  .sync-dot.synced { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
  .sync-dot.syncing { background: #eab308; animation: pulse 1s infinite; }
  .sync-dot.error { background: #ef4444; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .sync-setup { display: none; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 10px; padding: 14px 18px; margin: 0 24px 16px; max-width: 600px; margin-left: auto; margin-right: auto; }
  .sync-setup.show { display: block; }
  .sync-setup h3 { font-size: 0.9rem; margin-bottom: 8px; color: #166534; }
  .sync-setup p { font-size: 0.78rem; color: #15803d; margin-bottom: 10px; line-height: 1.5; }
  .sync-setup input { width: 100%; padding: 8px 12px; border: 1.5px solid #bbf7d0; border-radius: 6px; font-size: 0.85rem; margin-bottom: 8px; font-family: monospace; }
  .sync-setup .setup-actions { display: flex; gap: 8px; }
  .sync-setup .setup-actions .btn { font-size: 0.8rem; padding: 6px 14px; }

  .toolbar {
    display: flex; justify-content: center; gap: 10px;
    padding: 16px 24px; flex-wrap: wrap;
  }
  .btn {
    padding: 8px 18px; border-radius: 8px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; font-size: 0.85rem; font-weight: 500;
    transition: all 0.2s; display: flex; align-items: center; gap: 6px;
    color: var(--text); white-space: nowrap;
  }
  .btn:hover { box-shadow: var(--shadow-md); transform: translateY(-1px); }
  .btn-save { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-save:hover { background: #1d4ed8; }
  .btn-export { background: #eff6ff; border-color: #bfdbfe; color: #1e40af; }
  .btn-reset { background: var(--danger-light); border-color: #fecaca; color: #991b1b; }
  .btn .icon { font-size: 1rem; }

  .search-bar {
    max-width: 1100px; margin: 8px auto 0; padding: 0;
    display: flex; gap: 12px; align-items: center;
  }
  .search-input {
    flex: 1; padding: 9px 14px;
    border: 1.5px solid rgba(255,255,255,0.2); border-radius: 8px;
    font-size: 0.9rem; background: rgba(255,255,255,0.1);
    transition: all 0.2s; outline: none; color: white;
  }
  .search-input::placeholder { color: rgba(255,255,255,0.45); }
  .search-input:focus { border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.15); }
  .result-count { display: none; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px 24px 24px; }
  body { padding-left: 205px; transition: padding-left 0.3s; }

  .tabs {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px;
  }
  .tab {
    padding: 7px 16px; border-radius: 20px; border: 1.5px solid var(--border);
    background: white; cursor: pointer; font-size: 0.85rem; font-weight: 500;
    transition: all 0.2s; color: var(--text-secondary); white-space: nowrap; user-select: none;
  }
  .tab:hover { background: #e8f0fe; border-color: #93b8f5; }
  .tab.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3); }
  .tab .count { font-size: 0.7rem; opacity: 0.7; margin-left: 3px; }

  .summary-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 12px; margin-bottom: 24px;
  }
  .summary-card {
    background: white; padding: 14px 18px; border-radius: 10px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    cursor: pointer; transition: all 0.2s; text-align: center;
  }
  .summary-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .summary-card .label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 2px; }
  .summary-card .value { font-size: 1.4rem; font-weight: 700; color: var(--text); }

  .category { margin-bottom: 28px; scroll-margin-top: 160px; }
  .category-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 2px solid var(--border); }
  .category-header-left { display: flex; align-items: center; gap: 10px; }
  .category-icon {
    width: 36px; height: 36px; border-radius: 8px; display: flex;
    align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0;
  }
  .category-icon.mask { background: #fef3c7; }
  .category-icon.regulator { background: #fce7f3; }
  .category-icon.buoyancy { background: #d1fae5; }
  .category-icon.snorkel { background: #dbeafe; }
  .category-icon.wetsuit { background: #ede9fe; }
  .category-icon.boots { background: #e0f2fe; }
  .category-icon.light { background: #fee2e2; }
  .category-icon.fins { background: #ccfbf1; }
  .category-icon.computer { background: #fef3c7; }
  .category-icon.accessory { background: #f1f5f9; }
  .category-title { font-size: 1.15rem; font-weight: 700; }
  .category-count { font-size: 0.8rem; color: var(--text-secondary); font-weight: 400; }

  .table-wrapper { background: var(--card-bg); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  thead { background: #f5f8fb; border-bottom: 2px solid var(--border); }
  thead th { padding: 10px 16px; text-align: left; font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-secondary); }
  thead th.col-name { width: 54%; } thead th.col-price { width: 28%; text-align: right; } thead th.col-actions { width: 18%; text-align: center; }
  tbody td { padding: 9px 16px; border-bottom: 1px solid #f0f4f8; font-size: 0.9rem; }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr { transition: background 0.15s; }
  tbody tr:hover { background: #f5f8fb; }

  td[contenteditable] { outline: none; border-radius: 4px; transition: all 0.15s; cursor: text; }
  td[contenteditable]:hover { background: #eff6ff; box-shadow: inset 0 0 0 1px #93c5fd; }
  td[contenteditable]:focus { background: #eff6ff; box-shadow: inset 0 0 0 2px var(--accent); cursor: text; }
  td.product-name { font-weight: 500; word-break: break-all; }
  td.price { text-align: right; font-weight: 600; font-family: "SF Mono", "JetBrains Mono", "Menlo", monospace; }
  .price-simple { color: var(--text); }
  .price-range { color: var(--text); font-size: 0.85rem; }

  .row-actions { text-align: center; white-space: nowrap; }
  .btn-del-row {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; cursor: pointer; font-size: 1rem; color: #c4b5a5;
    transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; line-height: 1;
  }
  .btn-del-row:hover { background: #fef2f2; color: #ef4444; border-color: #fecaca; }
  .btn-move-up, .btn-move-down {
    width: 30px; height: 30px; border-radius: 6px; border: 1px solid transparent;
    background: transparent; cursor: pointer; font-size: 1rem; color: #94a3b8;
    transition: all 0.15s; display: inline-flex; align-items: center; justify-content: center; line-height: 1;
  }
  .btn-move-up:hover { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }
  .btn-move-down:hover { background: #eff6ff; color: #2563eb; border-color: #bfdbfe; }

  .add-row-area { padding: 10px 16px; text-align: center; border-top: 1px dashed var(--border); }
  .btn-add-row {
    padding: 7px 20px; border-radius: 6px; border: 1.5px dashed #d4c4b0;
    background: transparent; cursor: pointer; font-size: 0.85rem; color: var(--text-secondary);
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-add-row:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }

  .toast {
    position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
    background: #1e3a5f; color: white; padding: 10px 24px; border-radius: 8px;
    font-size: 0.9rem; font-weight: 500; z-index: 999; opacity: 0;
    transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { background: #059669; }
  .footer { text-align: center; padding: 24px; color: var(--text-secondary); font-size: 0.8rem; }
  .hidden { display: none !important; }
  mark { background: #bfdbfe; padding: 0 2px; border-radius: 2px; }

  /* Sidebar */
  .sidebar {
    position: fixed; left: 0; top: 64.29%; transform: translateY(-50%);
    z-index: 200; display: flex; flex-direction: column; gap: 1px;
    background: var(--card-bg); border: 1px solid var(--border); border-left: none;
    border-radius: 0 10px 10px 0; box-shadow: 2px 0 12px rgba(0,0,0,0.08);
    padding: 8px 6px; width: 185px; transition: transform 0.3s;
  }
  .sidebar.collapsed { transform: translate(-100%, -50%); }
  .sidebar-toggle {
    position: fixed; left: 185px; top: 64.29%; transform: translateY(-50%);
    z-index: 201; width: 20px; height: 54px; border-radius: 0 8px 8px 0;
    border: 1px solid var(--border); border-left: none; background: var(--card-bg);
    cursor: pointer; font-size: 0.65rem; color: var(--text-secondary);
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s; box-shadow: 2px 0 8px rgba(0,0,0,0.06);
    writing-mode: vertical-rl; letter-spacing: 2px;
  }
  .sidebar.collapsed ~ .sidebar-toggle, .sidebar-toggle.collapsed { left: 0; }
  .sidebar-toggle:hover { color: var(--accent); background: var(--accent-light); }
  .sidebar-item {
    display: flex; align-items: center; gap: 5px; padding: 5px 9px;
    border-radius: 5px; border: none; background: transparent; cursor: pointer;
    font-size: 0.73rem; color: var(--text-secondary); white-space: nowrap;
    transition: all 0.15s; text-align: left; width: 100%;
  }
  .sidebar-item:hover { background: #e8f0fe; color: var(--text); }
  .sidebar-item.active { background: var(--accent-light); color: var(--accent); font-weight: 600; }
  .sidebar-item .si-icon { font-size: 0.85rem; flex-shrink: 0; width: 20px; text-align: center; }
  .sidebar-item .si-name { flex: 1; overflow: hidden; text-overflow: ellipsis; }
  .sidebar-item .si-count { font-size: 0.58rem; opacity: 0.6; background: var(--border); padding: 0 4px; border-radius: 6px; line-height: 1.3; }

  .sidebar-divider { height: 1px; background: var(--border); margin: 6px 4px; }
  .sidebar-page-link {
    display: flex; align-items: center; gap: 5px; padding: 5px 9px;
    border-radius: 5px; border: none; background: transparent; cursor: pointer;
    font-size: 0.7rem; color: var(--text-secondary); white-space: nowrap;
    transition: all 0.15s; text-align: left; width: 100%; text-decoration: none;
  }
  .sidebar-page-link:hover { background: #e8f0fe; color: var(--text); }
  .sidebar-page-link.current { background: var(--accent-light); color: var(--accent); font-weight: 600; cursor: default; }

  .sidebar-top-btn {
    display: flex; align-items: center; justify-content: center; gap: 4px;
    padding: 6px 9px; margin: 3px 4px; border-radius: 5px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; font-size: 0.7rem; color: var(--text-secondary);
    transition: all 0.15s; text-align: center; width: calc(100% - 8px);
  }
  .sidebar-top-btn:hover { background: #e8f0fe; color: var(--text); }

  /* Back to Top */
  .back-to-top {
    position: fixed; bottom: 24px; right: 24px; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%; border: 1.5px solid var(--border);
    background: var(--card-bg); cursor: pointer; font-size: 1.2rem;
    color: var(--text-secondary); box-shadow: var(--shadow-md);
    transition: all 0.3s; opacity: 0; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .back-to-top.visible { opacity: 1; pointer-events: auto; }
  .back-to-top:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 16px rgba(37, 99, 235, 0.3); }


  .hamburger { display: none; }
  .sidebar-overlay { display: none; }
  .mobile-actions { display: none; }

  @media (max-width: 768px) {
    body { padding-left: 0 !important; }
    .header { padding: 12px 16px 12px; position: sticky; top: 0; }
    .header h1 { font-size: 1.15rem; }
    .header .subtitle { display: none; }
    .header .update-time { font-size: 0.68rem; margin-top: 1px; }
    .search-bar { margin-top: 4px; padding-left: 4px; display: flex; gap: 6px; align-items: center; }
    .search-input { padding: 7px 10px; font-size: 0.8rem; flex: 1; min-width: 0; }
    .container { padding: 10px 12px 24px; }
    .toolbar { display: none; }
    .toolbar .btn { padding: 7px 12px; font-size: 0.75rem; }
    .toolbar span { display: none !important; }
    .summary-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
    .summary-card { padding: 10px 12px; }
    .summary-card .value { font-size: 1.1rem; }
    .tabs { flex-wrap: nowrap; overflow-x: auto; gap: 6px; padding-bottom: 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { flex-shrink: 0; padding: 6px 12px; font-size: 0.75rem; }
    .category { margin-bottom: 20px; scroll-margin-top: 120px; }
    .category-header { padding-bottom: 8px; margin-bottom: 8px; }
    .category-title { font-size: 1rem; }
    .category-icon { width: 30px; height: 30px; font-size: 1rem; }
    .sidebar, .sidebar-toggle { display: none; }
    .sidebar.mobile-open { display: flex; position: fixed; left: 0; top: 0; height: 100vh; width: 240px; z-index: 350; border-radius: 0; border: none; border-right: 1px solid var(--border); box-shadow: 4px 0 20px rgba(0,0,0,0.15); transform: none; padding-top: 16px; overflow-y: auto; }
    .mobile-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .mobile-actions .btn-sm { padding: 6px 8px; font-size: 0.75rem; min-width: auto; white-space: nowrap; }
    .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 340; }
    .sidebar-overlay.open { display: block; }
    .hamburger { display: flex !important; position: fixed; right: 16px; bottom: 72px; z-index: 200; width: 40px; height: 40px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card-bg); cursor: pointer; font-size: 1.1rem; color: var(--text-secondary); box-shadow: var(--shadow-md); align-items: center; justify-content: center; }
    /* 卡片视图 */
    .table-wrapper { border-radius: 8px; }
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    tbody tr { display: flex; flex-wrap: wrap; align-items: flex-start; padding: 12px; margin-bottom: 8px; background: var(--card-bg); border-radius: 10px; box-shadow: var(--shadow); border: 1px solid var(--border); }
    tbody tr:last-child { margin-bottom: 0; }
    td { padding: 5px 0; border: none !important; }
    td.product-name { width: calc(100% - 44px); font-weight: 600; font-size: 0.95rem; padding-bottom: 4px; }
    td.price { width: calc(100% - 44px); text-align: left !important; font-size: 0.9rem; padding-bottom: 0; }
    td.price:before { content: "💰 价格："; font-weight: 500; color: var(--text-secondary); font-family: inherit; }
    td.row-actions { width: 40px; display: flex; flex-direction: column; gap: 4px; align-items: center; padding: 0 !important; flex-shrink: 0; }
    .btn-move-up, .btn-move-down, .btn-del-row { width: 36px; height: 36px; border: 1px solid var(--border); background: var(--bg); border-radius: 8px; }
    .btn-add-row { width: 100%; justify-content: center; padding: 10px; }
    .back-to-top { top: auto; bottom: 20px; right: 16px; transform: none; width: 40px; height: 40px; font-size: 1rem; }
    .footer { font-size: 0.7rem; padding: 16px; }
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0f172a; --card-bg: #1e293b; --text: #e2e8f0;
      --text-secondary: #94a3b8; --border: #334155;
      --shadow: 0 1px 3px rgba(0,0,0,0.3); --shadow-md: 0 4px 6px rgba(0,0,0,0.4);
    }
    thead { background: #1a2332; }
    tbody tr:hover { background: #1a2332; }
    tbody td { border-bottom-color: #1e293b; }
    td[contenteditable]:hover { background: #1e2e4a; }
    td[contenteditable]:focus { background: #1e2e4a; }
    .search-input { background: rgba(255,255,255,0.05); }
    .tab { background: #1e293b; border-color: #334155; }
    .btn { background: #1e293b; border-color: #334155; }
    .btn-save { background: var(--accent); }
    .summary-card { background: #1e293b; }
    .btn-add-row { border-color: #475569; }
  }
</style>
</head>
<body>

<div class="header">
  <button class="hamburger" id="hamburgerBtn" aria-label="菜单" title="分类导航">☰</button>
  <h1>🪸 产品零售价格表</h1>
  <div class="subtitle">Diving Equipment Retail Price List · 双击单元格即可编辑</div>
  <div class="update-time"><span id="updateTime">数据已加载</span><span class="sync-dot" id="syncDot" title="同步状态"></span></div>
  <div class="search-bar">
    <input type="text" class="search-input" id="searchInput" placeholder="🔍 搜索产品名称...（按 Esc 清除）">
    <span class="result-count" id="resultCount"></span>
	    <span class="mobile-actions">
	      <button class="btn btn-save btn-sm" id="btnSaveM"><span class="icon">💾</span></button>
	      <button class="btn btn-export btn-sm" id="btnExportM"><span class="icon">📥</span></button>
	      <button class="btn btn-reset btn-sm" id="btnResetM"><span class="icon">🔄</span></button>
	    </span>
  </div>
</div>

<nav class="sidebar" id="sidebar"></nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<button class="sidebar-toggle" id="sidebarToggle" title="展开/收起分类导航">分类导航</button>
<button class="back-to-top" id="backToTop" title="回到顶部">⬆</button>

<div class="container">
  <div class="toolbar">
    <button class="btn" id="btnSyncSetup" style="background:#f0fdf4;border-color:#86efac;color:#166534;"><span class="icon">⚙️</span> 自动同步设置</button>
    <button class="btn btn-export" id="btnExport"><span class="icon">📥</span> 导出 CSV</button>
    <button class="btn btn-reset" id="btnReset"><span class="icon">🔄</span> 恢复原始数据</button>
    <button class="btn" id="btnExportJSON" style="background:#fefce8;border-color:#fde68a;color:#92400e;"><span class="icon">📤</span> 导出 JSON</button>
	    <button class="btn" id="btnImportJSON" style="background:#f0fdf4;border-color:#bbf7d0;color:#166534;"><span class="icon">📥</span> 导入 JSON</button>
	    <input type="file" id="importFileInput" accept=".json" style="display:none;">
	    <span style="font-size:0.78rem;color:var(--text-secondary);display:flex;align-items:center;margin-left:8px;">💡 双击单元格编辑 · 自动保存到云端</span>
  </div>

  <!-- 自动同步设置面板 -->
  <div class="sync-setup" id="syncSetup">
    <h3>⚙️ 自动同步到手机</h3>
    <p>设置 GitHub Token 后，每次编辑都会自动推送到云端，手机端即时同步。<br>前往 <a href="https://github.com/settings/tokens" target="_blank">github.com/settings/tokens</a> 创建 <b>Fine-grained token</b>，选择仓库 <b>Casillaswzz/product-prices</b>，权限勾选 <b>Contents (Read & Write)</b>。</p>
    <input type="password" id="githubTokenInput" placeholder="粘贴 GitHub Token...">
    <div class="setup-actions">
      <button class="btn btn-save" id="btnSaveToken">✅ 保存并启用自动同步</button>
      <button class="btn" id="btnClearToken">🗑️ 清除 Token</button>

  var categories = [];

  function loadData() {
    var saved = localStorage.getItem("product-retail-price-data");
    var savedVersion = localStorage.getItem("product-retail-price-data-version") || "";

    // Fast initial load from localStorage or fallback
    if (saved) {
      try { categories = JSON.parse(saved); } catch(e) { categories = JSON.parse(JSON.stringify(ORIGINAL_DATA)); }
    } else {
      categories = JSON.parse(JSON.stringify(ORIGINAL_DATA));
    }

    // Background sync: try to fetch server data for latest version
    fetch('data/retail.json')
      .then(function(res) { if (!res.ok) throw new Error('no server data'); return res.json(); })
      .then(function(wrapper) {
        var serverCats = wrapper.categories || wrapper;
        var serverVer = wrapper.version || "";
        if (saved && savedVersion && savedVersion >= serverVer) {
          document.getElementById("updateTime").textContent = "数据来源：本地存储（上次保存）";
          return;
        }
        // Server data is newer — use it and cache locally
        categories = JSON.parse(JSON.stringify(serverCats));
        localStorage.setItem("product-retail-price-data", JSON.stringify(categories));
        localStorage.setItem("product-retail-price-data-version", serverVer);
        document.getElementById("updateTime").textContent = "数据来源：服务器同步（" + serverVer + "）";
        renderAll(document.getElementById("searchInput").value);
      })
      .catch(function() {
        if (saved) { document.getElementById("updateTime").textContent = "数据来源：本地存储（上次保存）"; }
        else { document.getElementById("updateTime").textContent = "数据来源：产品零售价格.docx"; }
      });
  }

  function resetToOriginal() {
    categories = JSON.parse(JSON.stringify(ORIGINAL_DATA));
    localStorage.removeItem("product-retail-price-data-version");
    document.getElementById("updateTime").textContent = "数据来源：产品零售价格.docx";
  }

  var toastTimer;
  function showToast(msg, type) {
    var el = document.getElementById("toast");
    el.textContent = msg;
    el.className = "toast " + (type || "") + " show";
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { el.classList.remove("show"); }, 3000);
  }

  function syncDOMtoData() {
    document.querySelectorAll(".category").forEach(function(catDiv) {
      var catId = catDiv.id.replace("cat-", "");
      var cat = null;
      for (var i = 0; i < categories.length; i++) {
        if (categories[i].id === catId) { cat = categories[i]; break; }
      }
      if (!cat) return;
      var rows = catDiv.querySelectorAll("tbody tr");
      rows.forEach(function(row) {
        var origIdx = parseInt(row.getAttribute("data-idx"), 10);
        var nameCell = row.querySelector(".product-name");
        var priceCell = row.querySelector(".price");
        if (nameCell && priceCell && origIdx >= 0 && origIdx < cat.products.length) {
          cat.products[origIdx] = [nameCell.textContent.trim(), priceCell.textContent.trim()];
        }
      });
    });
  }

  function autoSave() {
    try {
      syncDOMtoData();
      var now = new Date().toISOString().slice(0, 10);
      localStorage.setItem("product-retail-price-data", JSON.stringify(categories));
      localStorage.setItem("product-retail-price-data-version", now);
      var timeStr = new Date().toLocaleString("zh-CN");
      document.getElementById("updateTime").textContent = "数据来源：本地存储（自动保存：" + timeStr + "）";
      showToast("✅ 已自动保存 " + timeStr.slice(-8), "success");
      scheduleSync();
    } catch(e) {
      console.error("autoSave error:", e);
      showToast("❌ 自动保存失败，请刷新后重试", "");
    }
  }

  var syncTimer = null;
  function scheduleSync() {
    var token = localStorage.getItem("github-sync-token");
    if (!token) return;
    clearTimeout(syncTimer);
    syncTimer = setTimeout(syncToGitHub, 3000);
  }

  function updateSyncStatus(status) {
    var dot = document.getElementById("syncDot");
    if (!dot) return;
    dot.className = "sync-dot";
    if (status === "syncing") dot.className = "sync-dot syncing";
    else if (status === "synced") dot.className = "sync-dot synced";
    else if (status === "error") dot.className = "sync-dot error";
  }

  function syncToGitHub() {
    var token = localStorage.getItem("github-sync-token");
    if (!token) return;
    updateSyncStatus("syncing");
    var wrapper = { version: new Date().toISOString().slice(0,10), updated: new Date().toISOString(), categories: categories };
    var content = JSON.stringify(wrapper, null, 2);
    var base64 = btoa(unescape(encodeURIComponent(content)));
    var filename = "data/retail.json";

    fetch("https://api.github.com/repos/Casillaswzz/product-prices/contents/" + filename, {
      headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json" }
    })
    .then(function(r) { if (!r.ok) throw new Error("fetch sha failed"); return r.json(); })
    .then(function(data) {
      return fetch("https://api.github.com/repos/Casillaswzz/product-prices/contents/" + filename, {
        method: "PUT",
        headers: { "Authorization": "Bearer " + token, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ message: "自动同步: " + new Date().toLocaleString("zh-CN"), content: base64, sha: data.sha })
      });
    })
    .then(function(r) {
      if (r.ok) { updateSyncStatus("synced"); }
      else { updateSyncStatus("error"); console.error("GitHub sync failed:", r.status); }
    })
    .catch(function(err) { updateSyncStatus("error"); console.error("GitHub sync error:", err); });
  }

  function saveData() {
    autoSave();
    scheduleSync();
    showToast("✅ 已保存，正在同步到云端...", "success");
  }

  function resetData() {
    if (confirm("确定要恢复为原始数据吗？所有未保存的修改将丢失。")) {
      resetToOriginal();
      localStorage.removeItem("product-retail-price-data");
      localStorage.removeItem("product-retail-price-data-version");
      renderAll("");
      document.getElementById("searchInput").value = "";
      showToast("🔄 已恢复为原始数据");
    }
  }

  function exportCSV() {
    syncDOMtoData();
    var csv = "﻿";
    categories.forEach(function(cat) {
      csv += "\n" + cat.name + "\n" + cat.columns.join(",") + "\n";
      cat.products.forEach(function(p) {
        csv += '"' + (p[0]||"").replace(/"/g, '""') + '","' + (p[1]||"").replace(/"/g, '""') + '"\n';
      });
    });
    var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "产品零售价格_" + new Date().toISOString().slice(0,10) + ".csv";
    a.click();
    URL.revokeObjectURL(url);
    showToast("📥 CSV 文件已下载");
  }

  function getPriceClass(priceStr) {
    if (!priceStr) return "price-simple";
    if (/[~/\-]/.test(priceStr) && priceStr.length > 8) return "price-range";
    if (/[~/\-]/.test(priceStr)) return "price-range";
    return "price-simple";
  }

  function highlightMatch(text, query) {
    if (!query) return escapeHtml(text);
    var escaped = escapeHtml(text);
    var q = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return escaped.replace(new RegExp("(" + q + ")", "gi"), '<mark>$1</mark>');
  }

  function escapeHtml(str) {
    var div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderAll(filter) {
    filter = filter || "";
    var scrollY = window.scrollY;
    var filterLower = filter.toLowerCase().trim();
    var totalVisible = 0;
    var summaryGrid = document.getElementById("summaryGrid");
    var tabsDiv = document.getElementById("tabs");
    var content = document.getElementById("content");
    var resultCount = document.getElementById("resultCount");

    summaryGrid.innerHTML = categories.map(function(cat) {
      var visible = 0;
      cat.products.forEach(function(p) { if (!filterLower || p[0].toLowerCase().indexOf(filterLower) !== -1) visible++; });
      return '<div class="summary-card" data-cat="' + cat.id + '"><div class="label">' + cat.icon + ' ' + cat.name + '</div><div class="value">' + visible + '</div><div style="font-size:0.75rem;color:var(--text-secondary)">款产品</div></div>';
    }).join("");

    tabsDiv.innerHTML = '<button class="tab active" data-cat="all">📋 全部</button>' +
      categories.map(function(cat) {
        return '<button class="tab" data-cat="' + cat.id + '">' + cat.icon + ' ' + cat.name + '<span class="count">' + cat.products.length + '</span></button>';
      }).join("");

    content.innerHTML = categories.map(function(cat) {
      var visibleIndices = [];
      cat.products.forEach(function(p, i) {
        if (!filterLower || p[0].toLowerCase().indexOf(filterLower) !== -1) visibleIndices.push({ p: p, i: i });
      });
      totalVisible += visibleIndices.length;
      var hiddenClass = visibleIndices.length === 0 ? "hidden" : "";
      return '<div class="category ' + hiddenClass + '" id="cat-' + cat.id + '">'
        + '<div class="category-header"><div class="category-header-left">'
        + '<div class="category-icon ' + cat.iconClass + '">' + cat.icon + '</div>'
        + '<div><span class="category-title">' + cat.name + '</span><span class="category-count">· ' + visibleIndices.length + ' 款产品</span></div>'
        + '</div></div>'
        + '<div class="table-wrapper"><table>'
        + '<thead><tr><th class="col-name">' + cat.columns[0] + '</th><th class="col-price">' + cat.columns[1] + '</th><th class="col-actions">操作</th></tr></thead>'
        + '<tbody>'
        + visibleIndices.map(function(item) {
            var name = item.p[0], price = item.p[1], idx = item.i;
            return '<tr data-idx="' + idx + '">'
              + '<td class="product-name" contenteditable="true">' + highlightMatch(name, filterLower) + '</td>'
              + '<td class="price ' + getPriceClass(price) + '" contenteditable="true">' + highlightMatch(price, filterLower) + '</td>'
              + '<td class="row-actions">'
              + '<button class="btn-move-up" data-cat="' + cat.id + '" data-idx="' + idx + '" title="上移">▲</button>'
              + '<button class="btn-move-down" data-cat="' + cat.id + '" data-idx="' + idx + '" title="下移">▼</button>'
              + '<button class="btn-del-row" data-cat="' + cat.id + '" data-idx="' + idx + '" title="删除此行">✕</button>'
              + '</td></tr>';
          }).join("")
        + '</tbody></table>'
        + '<div class="add-row-area"><button class="btn-add-row" data-cat="' + cat.id + '">＋ 添加新产品</button></div>'
        + '</div></div>';
    }).join("");

    resultCount.innerHTML = filterLower
      ? '搜索 "<strong>' + escapeHtml(filter) + '</strong>"：<strong>' + totalVisible + '</strong> 条结果'
      : '共 <strong>' + totalVisible + '</strong> 款产品';

    renderSidebar();
    requestAnimationFrame(function() { window.scrollTo(0, scrollY); });
  }

  function renderSidebar() {
    var sidebar = document.getElementById("sidebar");
    var html = categories.map(function(cat) {
      return '<button class="sidebar-item" data-cat="' + cat.id + '">'
        + '<span class="si-icon">' + cat.icon + '</span>'
        + '<span class="si-name">' + cat.name + '</span>'
        + '<span class="si-count">' + cat.products.length + '</span></button>';
    }).join("");
    html += '<div class="sidebar-divider"></div>';
    html += '<a href="wholesale.html" class="sidebar-page-link">📦 出库价格</a>';
    html += '<span class="sidebar-page-link current">📍 零售价格</span>';
    html += '<a href="competitor.html" class="sidebar-page-link">📊 同行报价</a>';
    html += '<div class="sidebar-divider"></div>';
    html += '<button class="sidebar-top-btn" id="sidebarTopBtn" title="回到顶部">↑ 回到顶部</button>';
    sidebar.innerHTML = html;
  }

  function updateActiveSidebarItem() {
    var bestId = null, bestTop = Infinity;
    categories.forEach(function(cat) {
      var el = document.getElementById("cat-" + cat.id);
      if (!el || el.classList.contains("hidden")) return;
      var dist = Math.abs(el.getBoundingClientRect().top - 170);
      if (el.getBoundingClientRect().top <= 200 && dist < bestTop) { bestTop = dist; bestId = cat.id; }
    });
    document.querySelectorAll(".sidebar-item").forEach(function(item) {
      item.classList.remove("active");
      if (item.getAttribute("data-cat") === bestId) item.classList.add("active");
    });
  }

  function addRow(catId) {
    syncDOMtoData();
    var cat = null;
    for (var i = 0; i < categories.length; i++) { if (categories[i].id === catId) { cat = categories[i]; break; } }
    if (!cat) return;
    cat.products.push(["新产品名称", "0"]);
    var searchVal = document.getElementById("searchInput").value;
    renderAll(searchVal);
    autoSave();
    setTimeout(function() {
      var catDiv = document.getElementById("cat-" + catId);
      if (catDiv) {
        var rows = catDiv.querySelectorAll("tbody tr");
        if (rows.length) {
          var nameCell = rows[rows.length - 1].querySelector(".product-name");
          if (nameCell) { nameCell.focus(); var range = document.createRange(); range.selectNodeContents(nameCell); var sel = window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
        }
      }
    }, 100);
  }

  function deleteRow(catId, idx) {
    var cat = null;
    for (var i = 0; i < categories.length; i++) { if (categories[i].id === catId) { cat = categories[i]; break; } }
    if (!cat || idx < 0 || idx >= cat.products.length) return;
    if (!confirm("确定删除「" + cat.products[idx][0] + "」吗？")) return;
    syncDOMtoData();
    cat.products.splice(idx, 1);
    renderAll(document.getElementById("searchInput").value);
    autoSave();
    showToast("🗑️ 已删除");
  }

  function moveRow(catId, idx, direction) {
    syncDOMtoData();
    var cat = null;
    for (var i = 0; i < categories.length; i++) { if (categories[i].id === catId) { cat = categories[i]; break; } }
    if (!cat || idx < 0 || idx >= cat.products.length) return;
    var newIdx = idx + direction;
    if (newIdx < 0 || newIdx >= cat.products.length) return;
    var temp = cat.products[idx];
    cat.products[idx] = cat.products[newIdx];
    cat.products[newIdx] = temp;
    renderAll(document.getElementById("searchInput").value);
    autoSave();
  }

  document.addEventListener("click", function(e) {
    var target = e.target;
    if (target.closest(".btn-move-up")) {
      var btn = target.closest(".btn-move-up");
      moveRow(btn.getAttribute("data-cat"), parseInt(btn.getAttribute("data-idx"), 10), -1);
      return;
    }
    if (target.closest(".btn-move-down")) {
      var btn = target.closest(".btn-move-down");
      moveRow(btn.getAttribute("data-cat"), parseInt(btn.getAttribute("data-idx"), 10), 1);
      return;
    }
    if (target.closest("#sidebarTopBtn")) { window.scrollTo({ top: 0, behavior: "smooth" }); return; }
    if (target.closest(".btn-del-row")) {
      var btn = target.closest(".btn-del-row");
      deleteRow(btn.getAttribute("data-cat"), parseInt(btn.getAttribute("data-idx"), 10));
      return;
    }
    if (target.closest(".btn-add-row")) { addRow(target.closest(".btn-add-row").getAttribute("data-cat")); return; }
    if (target.closest(".summary-card")) { scrollToCategory(target.closest(".summary-card").getAttribute("data-cat")); return; }
    if (target.closest(".sidebar-item")) { scrollToCategory(target.closest(".sidebar-item").getAttribute("data-cat")); return; }
    if (target.closest(".tab")) {
      var tab = target.closest(".tab");
      var catId = tab.getAttribute("data-cat");
      if (catId === "all") {
        document.querySelectorAll(".category").forEach(function(c) { c.classList.remove("hidden"); });
        document.getElementById("searchInput").value = "";
        renderAll("");
        document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
        tab.classList.add("active");
      } else { scrollToCategory(catId); }
      return;
    }
  });

  document.addEventListener("input", function(e) {
    if (e.target.matches("td.price[contenteditable]")) {
      var text = e.target.textContent.trim();
      e.target.classList.remove("price-simple", "price-range");
      if (/[~/\-]/.test(text)) e.target.classList.add("price-range");
      else e.target.classList.add("price-simple");
      if (/=$/.test(text)) autoCalculate(e.target);
    }
  });

  function autoCalculate(cell) {
    var text = cell.textContent.trim();
    if (!text) return;
    if (/=\s*[\d.]+$/.test(text)) return;
    var match = text.match(/^([\d.]+)\s*([×xX*+\/\÷\-])\s*([\d.]+)=?$/);
    if (!match) return;
    var a = parseFloat(match[1]), op = match[2], b = parseFloat(match[3]), result;
    if (op === '+' || op === '＋') result = a + b;
    else if (op === '-' || op === '－') result = a - b;
    else if (op === '×' || op === 'x' || op === 'X' || op === '*') result = a * b;
    else if (op === '/' || op === '÷') result = a / b;
    else return;
    result = parseFloat(result.toFixed(4));
    cell.textContent = text.replace(/=?\s*$/, '') + '=' + result;
    var range = document.createRange();
    range.selectNodeContents(cell);
    range.collapse(false);
    var sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
    cell.dispatchEvent(new Event('input', {bubbles: true}));
  }

  document.addEventListener("focusout", function(e) {
    if (e.target.matches("td.price[contenteditable]")) {
      autoCalculate(e.target);
    }
    if (e.target.matches("td[contenteditable]")) {
      autoSave();
    }
  });

  document.addEventListener("keydown", function(e) {
    if (e.target.matches("td.price[contenteditable]") && e.key === "Enter") {
      e.preventDefault();
      autoCalculate(e.target);
      e.target.blur();
      return;
    }
    if ((e.ctrlKey || e.metaKey) && e.key === "s") { e.preventDefault(); syncDOMtoData(); saveData(); }
  });

  function scrollToCategory(id) {
    var el = document.getElementById("cat-" + id);
    if (el) {
      el.scrollIntoView({ behavior: "smooth", block: "start" });
      document.querySelectorAll(".tab").forEach(function(t) { t.classList.remove("active"); });
      var tab = document.querySelector('.tab[data-cat="' + id + '"]');
      if (tab) tab.classList.add("active");
    }
  }

  // 自动同步设置按钮
  var syncSetup = document.getElementById("syncSetup");
  document.getElementById("btnSyncSetup").addEventListener("click", function() {
    syncSetup.classList.toggle("show");
    var token = localStorage.getItem("github-sync-token");
    if (token) document.getElementById("githubTokenInput").value = token;
  });
  document.getElementById("btnSaveToken").addEventListener("click", function() {
    var token = document.getElementById("githubTokenInput").value.trim();
    if (!token) { showToast("❌ 请输入 GitHub Token", ""); return; }
    localStorage.setItem("github-sync-token", token);
    syncSetup.classList.remove("show");
    updateSyncStatus("syncing");
    showToast("✅ Token 已保存！编辑数据后将自动同步到云端", "success");
    syncToGitHub();
  });
  document.getElementById("btnClearToken").addEventListener("click", function() {
    if (confirm("确定清除 Token 并停止自动同步吗？")) {
      localStorage.removeItem("github-sync-token");
      document.getElementById("githubTokenInput").value = "";
      updateSyncStatus("");
      showToast("🗑️ Token 已清除，自动同步已停止");
    }
  });
  // 移动端保存按钮仍可用
  document.getElementById("btnSaveM").addEventListener("click", saveData);
  document.getElementById("btnExport").addEventListener("click", exportCSV);
  document.getElementById("btnExportJSON").addEventListener("click", exportJSON);
  document.getElementById("btnImportJSON").addEventListener("click", function() { document.getElementById("importFileInput").click(); });
  document.getElementById("importFileInput").addEventListener("change", function(e) { if (e.target.files[0]) importJSON(e.target.files[0]); e.target.value = ""; });
  
	  function exportJSON() {
	    syncDOMtoData();
	    var dataStr = JSON.stringify(categories, null, 2);
	    var blob = new Blob([dataStr], { type: "application/json;charset=utf-8" });
	    var url = URL.createObjectURL(blob);
	    var a = document.createElement("a");
	    a.href = url;
	    a.download = document.title + "_" + new Date().toISOString().slice(0,10) + ".json";
	    a.click();
	    URL.revokeObjectURL(url);
	    showToast("📤 数据已导出为 JSON 文件，可导入到其他设备", "success");
	  }
	  function importJSON(file) {
	    var reader = new FileReader();
	    reader.onload = function(e) {
	      try {
	        var data = JSON.parse(e.target.result);
	        if (!Array.isArray(data)) throw new Error("格式错误");
	        // basic validation
	        for (var i = 0; i < data.length; i++) {
	          if (!data[i].id || !data[i].name || !data[i].products) throw new Error("数据格式不正确");
	        }
	        categories = data;
	        localStorage.setItem("product-retail-price-data", JSON.stringify(categories));
	        renderAll(document.getElementById("searchInput").value);
	        showToast("📥 数据已导入（' + data.length + ' 个分类），请点击保存确认", "success");
	      } catch(err) {
	        showToast("❌ 导入失败：文件格式不正确", "");
	      }
	    };
	    reader.readAsText(file);
	  }

	  document.getElementById("btnReset").addEventListener("click", resetData);

  document.addEventListener("DOMContentLoaded", function() {
    loadData();
    renderAll("");
    // 检查是否已配置自动同步
    var token = localStorage.getItem("github-sync-token");
    if (token) {
      updateSyncStatus("syncing");
      document.getElementById("githubTokenInput").value = token;
      syncToGitHub();
    } else {
      updateSyncStatus("");
      setTimeout(function() { showToast("💡 点击「⚙️ 自动同步设置」配置 GitHub Token，实现编辑后自动同步到手机", ""); }, 1500);
    }
    var input = document.getElementById("searchInput");
    input.addEventListener("input", function() { renderAll(input.value); });
    input.addEventListener("keydown", function(e) { if (e.key === "Escape") { input.value = ""; renderAll(""); } });

    var sidebar = document.getElementById("sidebar");
    var sidebarToggle = document.getElementById("sidebarToggle");
    var sidebarVisible = true;
    var sidebarWidth = 205;
    function applySidebarOffset() {
      document.body.style.paddingLeft = sidebarVisible ? sidebarWidth + "px" : "22px";
      if (sidebarVisible) { sidebar.classList.remove("collapsed"); sidebarToggle.classList.remove("collapsed"); }
      else { sidebar.classList.add("collapsed"); sidebarToggle.classList.add("collapsed"); }
    }
    sidebarToggle.addEventListener("click", function() { sidebarVisible = !sidebarVisible; applySidebarOffset(); });
	    // 移动端侧边栏切换
	    var hamburgerBtn = document.getElementById("hamburgerBtn");
	    var sidebarOverlay = document.getElementById("sidebarOverlay");
	    hamburgerBtn.addEventListener("click", function() {
	      sidebar.classList.toggle("mobile-open");
	      sidebarOverlay.classList.toggle("open");
	    });
	    sidebarOverlay.addEventListener("click", function() {
	      sidebar.classList.remove("mobile-open");
	      sidebarOverlay.classList.remove("open");
	    });
	    // 点击侧边栏菜单项后自动关闭
	    sidebar.addEventListener("click", function(e) {
	      if (e.target.closest(".sidebar-item") || e.target.closest(".sidebar-page-link") || e.target.closest("#sidebarTopBtn")) {
	        setTimeout(function() { sidebar.classList.remove("mobile-open"); sidebarOverlay.classList.remove("open"); }, 200);
	      }
	    });
    applySidebarOffset();

    var backToTop = document.getElementById("backToTop");
    window.addEventListener("scroll", function() {
      if (window.scrollY > 400) backToTop.classList.add("visible");
      else backToTop.classList.remove("visible");
      updateActiveSidebarItem();
    });
    backToTop.addEventListener("click", function() { window.scrollTo({ top: 0, behavior: "smooth" }); });
    setTimeout(updateActiveSidebarItem, 200);
  });
})();
</script>
</body>
</html>
